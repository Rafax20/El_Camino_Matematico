name: "Exportar a Itch.io"
on:
  push:
    branches:
      - main 

jobs:
  export_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Exportar para Web
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          # Forzamos el nombre del archivo para que Butler lo encuentre siempre
          archive_filename: web.zip 
          use_preset_export_path: true 
          export_preset_name: Web

      # Este paso es opcional pero te ayudará a ver qué falló si Butler no encuentra el archivo
      - name: Verificar archivos generados
        run: ls -R

      - name: Publicar en Itch.io
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: web
          ITCH_GAME: tablero-didactico
          ITCH_USER: rafax20        
          # Intentamos con la ruta directa al archivo generado en la raíz
          PACKAGE: web.zip